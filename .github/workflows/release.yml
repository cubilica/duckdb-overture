name: Release
on:
  push:
    tags: ['v*']

jobs:
  build:
    uses: duckdb/extension-ci-tools/.github/workflows/_extension_distribution.yml@main
    with:
      extension_name: overture
      duckdb_version: v1.5.1
      ci_tools_version: main

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pages: write
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: Collect extension files
        run: |
          mkdir -p release
          find artifacts -name '*.duckdb_extension' -exec cp {} release/ \;
          find artifacts -name '*.duckdb_extension.wasm' -exec cp {} release/ \;
          ls -la release/

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          tag="${GITHUB_REF#refs/tags/}"
          gh release create "$tag" release/* \
            --repo "$GITHUB_REPOSITORY" \
            --title "$tag" \
            --generate-notes

      - name: Build extension repository for GitHub Pages
        run: |
          mkdir -p pages
          for dir in artifacts/overture-*-extension-*; do
            [ -d "$dir" ] || continue
            version=$(echo "$dir" | sed 's/.*overture-\(v[^-]*\)-.*/\1/')
            platform=$(echo "$dir" | sed 's/.*-extension-//')
            mkdir -p "pages/$version/$platform"
            for f in "$dir"/*; do
              cp "$f" "pages/$version/$platform/"
            done
          done
          find pages -type f | sort

      - uses: actions/upload-pages-artifact@v3
        with:
          path: pages/

  deploy-pages:
    needs: release
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
